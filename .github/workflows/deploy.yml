name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          PROJECT_ID=$(echo "$PROJECT_ID" | tr -d '[:space:]')
          GIT_SHA=$(echo "$GIT_SHA" | tr -d '[:space:]')
          IMAGE_TAG="us-central1-docker.pkg.dev/${PROJECT_ID}/sentinel-agent/sentinel-sre-agent:${GIT_SHA}"
          echo "Building: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          PROJECT_ID=$(echo "$PROJECT_ID" | tr -d '[:space:]')
          GIT_SHA=$(echo "$GIT_SHA" | tr -d '[:space:]')
          IMAGE_TAG="us-central1-docker.pkg.dev/${PROJECT_ID}/sentinel-agent/sentinel-sre-agent:${GIT_SHA}"
          gcloud run deploy sentinel-sre-agent \
            --image "$IMAGE_TAG" \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --concurrency 80 \
            --set-env-vars "SENTINEL_DEMO_MODE=false,GEMINI_MODEL=gemini-2.5-flash-lite,PYTHONUNBUFFERED=1,PHOENIX_COLLECTOR_ENDPOINT=https://app.phoenix.arize.com/s/abhikohli-hdr,SENTINEL_PROJECT_NAME=demo_llama_index" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,PHOENIX_API_KEY=phoenix-api-key:latest"

      - name: Show URL
        run: |
          URL=$(gcloud run services describe sentinel-sre-agent \
            --region us-central1 \
            --format 'value(status.url)')
          echo "Deployed to: $URL"
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
